{% extends "base.html" %}
{% block content %}
<h1>Покупатели</h1>

<p class="page-actions"><a class="button" href="/customers/new">Добавить покупателя</a></p>

{# CST-01: active search — debounce 300ms, hx-sync kills stale-response races. #}
<input type="search" name="q" placeholder="Имя, фамилия или номер консультанта…" autofocus
       hx-get="/customers/search"
       hx-trigger="input changed delay:300ms, keyup[key=='Enter']"
       hx-target="#customer-rows"
       hx-swap="outerHTML"
       hx-sync="this:replace">

{% include "partials/customer_rows.html" %}
{% endblock %}
